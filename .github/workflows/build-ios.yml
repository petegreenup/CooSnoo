name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm install

      - name: Install Capacitor iOS (pinned to match project version)
        run: npm install @capacitor/ios@8.3.0

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: |
          npx cap add ios
          echo "=== Contents of ios/ after cap add ==="
          ls -la ios/ || echo "ERROR: ios/ directory was not created"
          ls -la ios/App/ || echo "ERROR: ios/App/ directory was not created"

      - name: Sync Capacitor iOS platform
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/CooSnoo.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            archive

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/CooSnoo.xcarchive/Products/Applications/App.app" \
                "$RUNNER_TEMP/Payload/CooSnoo.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload CooSnoo-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CooSnoo-iOS-unsigned
          path: ${{ runner.temp }}/CooSnoo-unsigned.ipa
          retention-days: 14
