name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm install

      - name: Install Capacitor iOS package
        run: npm install @capacitor/ios

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS platform
        run: npx cap sync ios

      - name: Show iOS directory structure
        run: find ios -maxdepth 3 -type f | head -40

      - name: Install CocoaPods dependencies
        run: |
          PODFILE_DIR=$(find ios -name "Podfile" -not -path "*/Pods/*" | head -1 | xargs dirname)
          echo "Found Podfile in: $PODFILE_DIR"
          cd "$PODFILE_DIR"
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/Pods/*" | head -1)
          WORKSPACE_DIR=$(dirname "$WORKSPACE")
          WORKSPACE_NAME=$(basename "$WORKSPACE")
          echo "Using workspace: $WORKSPACE"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/CooSnoo.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            archive

          # Package .app into a sideload-ready .ipa
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/CooSnoo.xcarchive/Products/Applications/App.app" \
                "$RUNNER_TEMP/Payload/CooSnoo.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload CooSnoo-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CooSnoo-iOS-unsigned
          path: ${{ runner.temp }}/CooSnoo-unsigned.ipa
          retention-days: 14
